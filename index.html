<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Музыкальная матрица 44x44</title>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: #fff; margin: 0; padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(44, 12px); 
            gap: 1px; 
            margin-top: 20px; 
        }
        .tile { 
            width: 12px; height: 12px; 
            cursor: pointer; 
            border-radius: 1px;
            transition: transform 0.1s;
        }
        .tile:active { transform: scale(1.5); z-index: 10; }
        .controls { 
            margin-top: 20px; padding: 20px; 
            background: #1a1a1a; border-radius: 10px; 
            text-align: center; width: 300px;
        }
    </style>
</head>
<body>

    <h2>Матрица капель 44x44</h2>
    <div class="grid" id="grid"></div>

    <div class="controls">
        <label>Глубина звука (Фильтр):</label><br>
        <input type="range" id="muffle" min="100" max="8000" value="8000" style="width: 100%;">
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const grid = document.getElementById('grid');
        const muffleSlider = document.getElementById('muffle');

        const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

        for (let i = 0; i < 1936; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            // Генерируем "патину" (оттенки сине-зеленого)
            const hue = 180 + Math.random() * 40; 
            const lightness = 20 + Math.random() * 40;
            tile.style.backgroundColor = `hsl(${hue}, 70%, ${lightness}%)`;
            
            const noteFreq = notes[i % notes.length];
            tile.onclick = () => playDrop(noteFreq);
            grid.appendChild(tile);
        }

        function playDrop(freq) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            filter.type = 'lowpass';
            filter.frequency.value = muffleSlider.value;

            osc.frequency.setValueAtTime(freq * 1.2, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
    </script>
    <script src="https://dmamax.netlify.app/legal-module.js"></script>
    
</body>
</html>
