<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>web3audio</title>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; margin: 0; }
        canvas { cursor: crosshair; image-rendering: pixelated; margin-top: 10px; }
        .controls { padding: 15px; background: #222; width: 100%; display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="instrument">
            <option value="sine">Чаша</option>
            <option value="triangle">Пианино</option>
            <option value="sawtooth">Скрипка</option>
            <option value="square">Тромбон</option>
        </select>
        <label>Глухота: <input type="range" id="muffle" min="100" max="8000" value="4000"></label>
    </div>

    <canvas id="canvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Рисуем сетку 500x500
        for(let x=0; x<500; x++) {
            for(let y=0; y<500; y++) {
                ctx.fillStyle = `hsl(${Math.random() * 360}, 50%, 30%)`;
                ctx.fillRect(x, y, 1, 1);
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Частота зависит от позиции клика (по оси Y)
            const freq = 100 + (y / 500) * 800;
            playSound(freq);
        });

        function playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = document.getElementById('instrument').value;
            filter.frequency.value = document.getElementById('muffle').value;
            
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

            osc.connect(filter).connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }
    </script>
<script src="https://dmamax.netlify.app/legal-module.js"></script>

</body>
</html>
