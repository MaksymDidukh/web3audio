<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>web3audio</title>
    <style>
        body { background: #080808; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 400px; }
        .controls { display: flex; gap: 10px; width: 100%; justify-content: center; }
        canvas { border: 2px solid #333; cursor: crosshair; margin-top: 10px; image-rendering: pixelated; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="controls">
            <label>Размер: <input type="range" id="sizeSlider" min="12" max="500" value="28"></label>
            <span id="sizeVal">28</span>x28
        </div>
        <div class="controls">
            <label>Глухота: <input type="range" id="muffle" min="100" max="8000" value="4000"></label>
        </div>
        <select id="instrument">
            <option value="sine">Чаша</option>
            <option value="triangle">Пианино</option>
            <option value="sawtooth">Скрипка</option>
            <option value="square">Тромбон</option>
        </select>
        <button onclick="initGrid()">Применить настройки</button>
        <div class="controls">
            <button id="recBtn">Начать запись</button>
            <button id="stopBtn" disabled>Стоп и скачать</button>
        </div>
    </div>

    <canvas id="musicCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('musicCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // --- Логика записи ---
        const dest = audioCtx.createMediaStreamDestination();
        const recorder = new MediaRecorder(dest.stream);
        let chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my-music.webm';
            a.click();
        };

        document.getElementById('recBtn').onclick = () => {
            chunks = [];
            recorder.start();
            document.getElementById('recBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            recorder.stop();
            document.getElementById('recBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        // --- Логика игры ---
        let size = 128;
        document.getElementById('sizeSlider').oninput = (e) => {
            document.getElementById('sizeVal').textContent = e.target.value;
        };

        function initGrid() {
            size = parseInt(document.getElementById('sizeSlider').value);
            ctx.clearRect(0, 0, 600, 600);
            const cellSize = 600 / size;
            for(let i = 0; i < size * size; i++) {
                const x = (i % size) * cellSize;
                const y = Math.floor(i / size) * cellSize;
                ctx.fillStyle = `hsl(${(i / (size * size)) * 360}, 50%, 40%)`;
                ctx.fillRect(x, y, cellSize, cellSize);
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const y = (e.clientY - rect.top) / (600 / size);
            const freq = 100 + (1 - (y / size)) * 800;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = document.getElementById('instrument').value;
            filter.frequency.value = document.getElementById('muffle').value;
            
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            // Подключаем звук к колонкам И к регистратору
            osc.connect(filter).connect(gain);
            gain.connect(audioCtx.destination);
            gain.connect(dest); 

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        });

        initGrid();
    </script>
<script src="https://dmamax.netlify.app/legal-module.js"></script>

</body>
</html>
